<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M|Direct Performance Sumatera</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>

    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; padding: 20px; margin: 0; text-align: center; }
        .container { width: 95%; max-width: 1300px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0px 4px 20px rgba(0,0,0,0.08); }
        
        .header-banner { 
            color: white; 
            background: linear-gradient(90deg, #6a1b9a, #8e24aa); 
            padding: 20px 15px; 
            border-radius: 8px; 
            margin-bottom: 20px;
        }
        .header-banner h2 { margin: 0; padding: 0; font-size: 24px; }
        .as-of-text { display: block; font-size: 14px; margin-top: 8px; font-weight: normal; opacity: 0.9; }

        .filter-container { display: flex; flex-wrap: wrap; gap: 10px; padding: 20px; background: #f8f9fa; border-radius: 10px; margin-bottom: 20px; border: 1px solid #e9ecef; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 6px; flex: 1; min-width: 150px; }
        #periodeFilter { border: 2px solid #6a1b9a; font-weight: bold; }

        .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; color: white; }
        .reset-btn { background: #28a745; }
        .back-btn { background: #dc3545; }
        .print-btn { background: #6f42c1; }
        .btn:hover { opacity: 0.8; }
        
        .table-container { overflow-x: auto; margin-top: 10px; border-radius: 8px; max-height: 700px; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; background: white; }
        th, td { padding: 12px 10px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #6a1b9a; color: white; position: sticky; top: 0; z-index: 5; white-space: nowrap; }
        
        /* Utility Classes */
        .highlight-red { color: #dc3545; font-weight: bold; }
        .highlight-yes { color: #28a745; font-weight: bold; }
        .clickable-name { color: #6a1b9a; font-weight: bold; cursor: pointer; text-decoration: underline; }
        #chartWrapper { display: none; margin-bottom: 30px; padding: 20px; border: 2px solid #6a1b9a; border-radius: 12px; background: #fff; }

        /* --- RESPONSIVE CARD VIEW (SMARTPHONE) --- */
        @media screen and (max-width: 768px) {
            body { padding: 10px; }
            .container { padding: 8px; width: 100%; box-sizing: border-box; }
            
            /* Banner Header lebih ramping */
            .header-banner { padding: 15px 10px; margin-bottom: 15px; }
            .header-banner h2 { font-size: 18px; }
        
            /* Filter dibuat 2 kolom */
            .filter-container { 
                display: grid; 
                grid-template-columns: 1fr 1fr; /* Membagi 2 kolom sama rata */
                gap: 8px; 
                padding: 12px;
            }
        
            /* Search Box dipaksa ambil 2 kolom (full width) agar nyaman mengetik */
            #searchBox { 
                grid-column: span 2; 
                order: -1; /* Tetap di paling atas */
            }
        
            /* Tombol Reset, Print, dan M-Booking dalam satu baris */
            .btn, .reset-btn, .print-btn, .back-btn { 
                width: 100%; 
                padding: 10px 5px; 
                font-size: 11px; /* Ukuran font tombol diperkecil agar muat */
                margin: 0;
            }
        
            /* Khusus pembungkus tombol agar sejajar */
            .reset-btn { grid-column: span 1; }
            .print-btn { grid-column: span 1; }
            .back-btn { grid-column: span 2; } /* M-Booking dibuat full width bawah atau span 1 jika mau sebaris bertiga */
        
            /* Jika ingin Reset, Print, M-Booking SEBARIS bertiga, gunakan ini: */
            /* .reset-btn { grid-column: span 2/3; } 
            dst... atau cara termudah:
            */
            
            /* Bungkus tombol terakhir agar rapi */
            .btn-row {
                display: flex;
                gap: 5px;
                grid-column: span 2;
            }
        
            /* Style Tabel Card tetap seperti sebelumnya tapi lebih ramping */
            table thead { display: none; }
            table, tbody, tr, td { display: block; width: 100%; }
            tr { margin-bottom: 12px; border-radius: 8px; border: 1px solid #ddd; }
            td { 
                display: flex; 
                justify-content: space-between; 
                padding: 6px 10px; 
                font-size: 12px; 
                border-bottom: 1px solid #f5f5f5;
            }
            td::before { content: attr(data-label); font-weight: 600; color: #6a1b9a; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-banner">
        <h2>M-Direct Performance Region Sumatera</h2>
        <span id="asOfDisplay" class="as-of-text"></span>
    </div>

    <div class="filter-container">
        <select id="periodeFilter" onchange="filterAndSearchTable()"><option value="">All Period</option></select>
        <input type="text" id="searchBox" placeholder="Search Name or Code..." onkeyup="filterAndSearchTable()">
        <select id="positionFilter" onchange="filterAndSearchTable()"><option value="">All Position</option></select>
        <select id="branchFilter" onchange="filterAndSearchTable()"><option value="">All Branch</option></select>
        <select id="zeroMTDFilter" onchange="filterAndSearchTable()"><option value="">Login MTD (All)</option></select>
        
        <div class="btn-row" style="display: flex; gap: 5px; grid-column: span 2; width: 100%;">
            <button class="btn reset-btn" onclick="resetFilter()">Reset</button>
            <button class="btn print-btn" onclick="printTable()">Print</button>
            <button class="btn back-btn" onclick="openPage()" style="flex: 2;">→ M-Booking</button>
        </div>
    </div>

    <div id="chartWrapper">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h4 id="chartTitle" style="margin: 0; color: #6a1b9a;">Performance Detail</h4>
            <button onclick="closeChart()" style="border:none; background:#eee; cursor:pointer; padding:5px 10px; border-radius:4px;">✕ Close</button>
        </div>
        <div style="height: 350px;"><canvas id="performanceChart"></canvas></div>
    </div>

    <div class="table-container">
        <table id="dataTable">
            <thead id="tableHeadParent">
                <tr id="tableHead"></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    let tableData = [];
    let myChart = null;

    fetch('Dataset.json')
        .then(res => res.json())
        .then(data => {
            tableData = data;
            populateTable(data);
        })
        .catch(err => {
            console.error("Error loading JSON:", err);
            // Dummy data untuk testing jika file JSON tidak ditemukan
            // tableData = [{"Main Branch":"MEDAN BALAIKOTA","Office":"KCP SUKARAMAI","Total":2.184,"KPR":"-","EMAS":84,"NON CONSUMER":2.100}];
            // populateTable(tableData);
        });

    function populateTable(data) {
        const tableHead = document.getElementById('tableHead');
        const tableBody = document.getElementById('tableBody');
        const branchFilter = document.getElementById('branchFilter');
        const periodeFilter = document.getElementById('periodeFilter');
        const positionFilter = document.getElementById('positionFilter');

        tableBody.innerHTML = '';
        let branches = new Set();
        let periods = new Set();
        let positions = new Set();

        if (data.length > 0) {
            const headers = Object.keys(data[0]);
            tableHead.innerHTML = headers.map(h => `<th>${h}</th>`).join('');

            data.forEach(row => {
                let tr = document.createElement('tr');
                headers.forEach((header, index) => {
                    let td = document.createElement('td');
                    let val = (row[header] === null || row[header] === undefined || row[header] === "") ? "-" : row[header];
                    
                    td.textContent = val;
                    // Atribut ini penting untuk tampilan Mobile Card
                    td.setAttribute('data-label', header);

                    if (index === 2) { 
                        td.classList.add('clickable-name');
                        td.onclick = () => showChart(row);
                    }
                    
                    // Highlights
                    if (header.toLowerCase().includes("mtd") && (val == "0" || val == 0)) td.classList.add("highlight-red");
                    if (header.toLowerCase().includes("dtd") && val === "Y") td.classList.add("highlight-yes");
                    if (header.toLowerCase().includes("dtd") && val === "N") td.classList.add("highlight-red");
                    
                    tr.appendChild(td);
                });
                tableBody.appendChild(tr);

                if(row['Branch']) branches.add(row['Branch'].toString().trim());
                if(row['Period']) periods.add(row['Period'].toString().trim());
                const posColName = headers[3]; 
                if(row[posColName]) positions.add(row[posColName].toString().trim());
            });

            fillSelect(branchFilter, branches, 'All Branch', false);
            const sortedPeriods = Array.from(periods).sort((a, b) => new Date(b) - new Date(a));
            fillSelect(periodeFilter, sortedPeriods, 'All Period', true);
            
            if (sortedPeriods.length > 0) {
                periodeFilter.value = sortedPeriods[0];
            }

            fillPositionSelect(positionFilter, positions);
            filterAndSearchTable();
        }
    }

    function fillSelect(el, dataArray, label, isSortedArray) {
        el.innerHTML = `<option value="">${label}</option>`;
        let finalData = isSortedArray ? dataArray : Array.from(dataArray).sort();
        finalData.forEach(v => {
            let opt = document.createElement('option');
            opt.value = v; opt.textContent = v;
            el.appendChild(opt);
        });
    }

    function filterAndSearchTable() {
        const fPer = document.getElementById('periodeFilter').value;
        const asOfDisplay = document.getElementById('asOfDisplay');
        asOfDisplay.textContent = fPer !== "" ? `as of ${fPer}` : "";

        const sBox = document.getElementById('searchBox').value.toLowerCase();
        const fPos = document.getElementById('positionFilter').value;
        const fBranch = document.getElementById('branchFilter').value;
        const fMTD = document.getElementById('zeroMTDFilter').value;

        document.querySelectorAll('#tableBody tr').forEach(row => {
            const cells = row.cells;
            if (cells.length === 0) return;
            
            const txtName = cells[2] ? cells[2].textContent.toLowerCase() : "";
            const txtCode = cells[1] ? cells[1].textContent.toLowerCase() : "";
            const txtBranch = cells[4] ? cells[4].textContent.trim() : "";
            const txtPer = cells[0] ? cells[0].textContent.trim() : "";
            const txtMTD = cells[5] ? cells[5].textContent.trim() : "";
            const txtPos = cells[3] ? cells[3].textContent.trim() : "";

            const matchSearch = txtName.includes(sBox) || txtCode.includes(sBox);
            const matchBranch = !fBranch || txtBranch === fBranch;
            const matchPer = !fPer || txtPer === fPer;
            const matchMTD = !fMTD || txtMTD === fMTD;
            
            let matchPos = true;
            if (fPos === "RM_ALL") matchPos = txtPos.startsWith("RM");
            else if (fPos !== "") matchPos = (txtPos === fPos);

            row.style.display = (matchSearch && matchPos && matchBranch && matchPer && matchMTD) ? "" : "none";
        });
    }

    function fillPositionSelect(el, set) {
        el.innerHTML = '<option value="">All Position</option><option value="RM_ALL">RM (All Group)</option>';
        Array.from(set).sort().forEach(v => {
            let opt = document.createElement('option');
            opt.value = v; opt.textContent = v;
            el.appendChild(opt);
        });
    }

    function closeChart() { document.getElementById('chartWrapper').style.display = 'none'; }
    
    function resetFilter() {
        document.getElementById('searchBox').value = "";
        document.getElementById('positionFilter').value = "";
        document.getElementById('branchFilter').value = "";
        document.getElementById('zeroMTDFilter').value = "";
        const periodeFilter = document.getElementById('periodeFilter');
        if (periodeFilter.options.length > 1) {
            periodeFilter.value = periodeFilter.options[1].value;
        } else {
            periodeFilter.value = "";
        }
        filterAndSearchTable(); 
        closeChart();
    }

    function printTable() { window.print(); }
    function openPage() { window.location.href = 'https://m-activity.vercel.app/'; }

    function showChart(rowData) {
        const wrapper = document.getElementById('chartWrapper');
        const ctx = document.getElementById('performanceChart').getContext('2d');
        wrapper.style.display = 'block';
        document.getElementById('chartTitle').innerText = "Performance Detail: " + (rowData['Marketing Name'] || rowData['Name'] || "User");
        if (myChart) myChart.destroy();
        
        const findVal = (target) => {
            const keys = Object.keys(rowData);
            const foundKey = keys.find(k => k.toLowerCase().includes(target.toLowerCase()));
            if (foundKey) {
                let rawVal = rowData[foundKey].toString().replace(',', '.');
                return parseFloat(rawVal) || 0;
            }
            return 0;
        };

        const mCall = findVal('MTD Call');
        const mVisit = findVal('MTD Visit');
        const aCall = findVal('AVG Call');
        const aVisit = findVal('AVG Visit');

        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Total MTD', 'Daily Average'],
                datasets: [
                    { label: 'Calls', data: [mCall, aCall], backgroundColor: '#6a1b9a', borderRadius: 5 },
                    { label: 'Visits', data: [mVisit, aVisit], backgroundColor: '#f39c12', borderRadius: 5 }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'top' },
                    datalabels: { 
                        anchor: 'end', align: 'top', font: { weight: 'bold' },
                        formatter: (value, context) => {
                            if (context.chart.data.labels[context.dataIndex] === 'Total MTD') return Math.round(value);
                            return value.toLocaleString('id-ID', { minimumFractionDigits: 1, maximumFractionDigits: 1 });
                        }
                    }
                },
                scales: { y: { beginAtZero: true, grace: '20%' } }
            },
            plugins: [ChartDataLabels]
        });
        wrapper.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
</script>
</body>
</html>
