<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M|Direct Performance Sumatera</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>

    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; padding: 20px; margin: 0; text-align: center; }
        .container { width: 98%; max-width: 1400px; margin: 0 auto; background: #fff; padding: 15px; border-radius: 12px; box-shadow: 0px 4px 20px rgba(0,0,0,0.08); }
        
        .header-banner { 
            color: white; 
            background: linear-gradient(90deg, #8e24aa, #6a1b9a); 
            padding: 20px; 
            border-radius: 8px; 
            margin-bottom: 15px;
        }
        .header-banner h2 { margin: 0; font-size: 22px; }
        .as-of-text { display: block; font-size: 14px; margin-top: 5px; opacity: 0.9; }

        /* Filter Container - Desktop Mode (Satu Baris) */
        .filter-container { 
            display: flex; 
            flex-direction: row; /* Horizontal */
            align-items: center;
            gap: 8px; 
            padding: 15px; 
            background: #f8f9fa; 
            border-radius: 8px; 
            margin-bottom: 20px; 
            border: 1px solid #eee;
            flex-wrap: nowrap; /* Mencegah turun ke baris baru di layar lebar */
        }

        /* Styling Input & Select agar lebar proporsional */
        input, select { 
            padding: 10px; 
            border: 1px solid #ccc; 
            border-radius: 6px; 
            font-size: 13px;
            flex: 1; /* Memberi ruang yang sama */
            min-width: 120px;
        }

        /* Button Styles */
        .btn { 
            padding: 10px 15px; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold; 
            color: white; 
            font-size: 13px;
            white-space: nowrap; /* Teks tombol tidak pecah */
            transition: 0.2s;
        }
        
        .reset-btn { background-color: #28a745; } /* Hijau */
        .print-btn { background-color: #6f42c1; } /* Ungu */
        .export-btn { background-color: #f39c12; } /* Oranye */
        .back-btn { background-color: #dc3545; } /* Merah */

        .btn:hover { opacity: 0.8; }

        /* Tabel */
        .table-container { overflow-x: auto; border-radius: 8px; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #6a1b9a; color: white; position: sticky; top: 0; }

        /* Responsive Smartphone */
        @media screen and (max-width: 900px) {
            .filter-container { 
                flex-direction: column; /* Berubah jadi tumpukan vertikal di HP */
                flex-wrap: wrap;
            }
            input, select, .btn { 
                width: 100%; 
                flex: none;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-banner">
        <h2>Top 10 Booking Performance Region Sumatera</h2>
        <span id="asOfDisplay" class="as-of-text">as of 13 April 2026</span>
    </div>

    <div class="filter-container">
        <select id="branchFilter" onchange="filterTable()">
            <option value="">Semua Main Branch</option>
        </select>
        
        <select id="officeFilter" onchange="filterTable()">
            <option value="">Semua Office</option>
        </select>

        <select id="topFilter" onchange="filterTable()">
            <option value="">Top 10 Booking</option>
        </select>

        <button class="btn reset-btn" onclick="resetFilter()">Reset</button>
        <button class="btn print-btn" onclick="window.print()">Print</button>
        <button class="btn export-btn" onclick="exportToExcel()">Export XLS</button>
        <button class="btn back-btn" onclick="location.href='https://m-activity.vercel.app/'">M-Direct</button> 
    </div>

    <div class="table-container">
        <table id="dataTable">
            <thead>
                <tr>
                    <th>Periode</th>
                    <th>Nama</th>
                    <th>Cabang</th>
                    <th>Office</th>
                    <th>Booking MTD</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>
</div>

<script>
    // Fungsi simulasi reset
    function resetFilter() {
        document.querySelectorAll('select').forEach(s => s.selectedIndex = 0);
        alert('Filter dikosongkan');
    }

    // Fungsi Export ke Excel
    function exportToExcel() {
        var table = document.getElementById("dataTable");
        var wb = XLSX.utils.table_to_book(table, {sheet: "Sheet1"});
        XLSX.writeFile(wb, "Performance_Report.xlsx");
    }

    // Script tambahan untuk populasi data bisa Anda masukkan di sini sesuai kebutuhan Dataset.json Anda
</script>

</body>
</html>
