<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M|Direct Performance Sumatera</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>

    <style>
        /* Gaya Dasar */
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
            background-color: #f0f2f5;
            padding: 20px;
            margin: 0;
        }

        .container {
            width: 95%;
            max-width: 1250px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.08);
        }

        h2 {
            color: white;
            background: linear-gradient(90deg, #6a1b9a, #8e24aa);
            padding: 15px;
            border-radius: 8px;
            margin-top: 0;
            margin-bottom: 10px;
        }

        h3 {
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            margin: 10px 0;
            color: #444;
        }

        /* Filter dan Tombol */
        .filter-container {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #e9ecef;
        }

        input[type="text"],
        select {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            outline: none;
            flex: 1;
            min-width: 160px;
        }

        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            color: white;
            font-size: 13px;
        }
        .reset-btn { background: #28a745; }
        .reset-btn:hover { background: #218838; }
        .back-btn { background: #dc3545; }
        .back-btn:hover { background: #c82333; }
        .print-btn { background: #6f42c1; }
        .print-btn:hover { background: #5a32a3; }
        .export-btn { background: #f39c12; }
        .export-btn:hover { background: #e67e22; }

        /* Grafik Area */
        #chartWrapper {
            display: none;
            margin-bottom: 30px;
            padding: 25px;
            background: #fff;
            border: 2px solid #6a1b9a;
            border-radius: 12px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.1);
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Tabel */
        .table-container {
            overflow-x: auto;
            margin-top: 10px;
            border-radius: 8px;
            border: 1px solid #eee;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12.5px;
        }

        th, td {
            padding: 12px 8px;
            border: 1px solid #ddd;
            text-align: left;
            white-space: nowrap;
        }

        th {
            background-color: #6a1b9a;
            color: white;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        /* Kolom Tersembunyi (Marketing Code) */
        table td:nth-child(2), th:nth-child(2) { display: none; }

        /* Highlight */
        .highlight-yes { color: #28a745; font-weight: bold; }
        .highlight-no, .highlight-red { color: #dc3545; font-weight: bold; }
        .clickable-name { 
            color: #6a1b9a; 
            font-weight: bold; 
            cursor: pointer; 
            text-decoration: underline; 
        }
        .clickable-name:hover { color: #8e24aa; }

        @media screen and (max-width: 768px) {
            .filter-container { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>M-Direct Performance Region Sumatera</h2>

        <div class="filter-container">
            <select id="periodeFilter" onchange="filterAndSearchTable()">
                <option value="">All Period</option>
            </select>

            <input type="text" id="searchBox" placeholder="Search Name or Code..." onkeyup="filterAndSearchTable()">
            
            <select id="positionFilter" onchange="filterAndSearchTable()">
                <option value="">All Position</option>
                <option value="RM">RM</option>
                <option value="CS">CS</option>
            </select>

            <select id="branchFilter" onchange="filterAndSearchTable()">
                <option value="">All Branch</option>
            </select>

            <select id="zeroMTDFilter" onchange="filterAndSearchTable()">
                <option value="">Login MTD (All)</option>
                <option value="0">NOT Login MTD</option>
            </select>

            <button class="btn reset-btn" onclick="resetFilter()">Reset</button>
            <button class="btn print-btn" onclick="printTable()">Print</button>
            <button class="btn export-btn" onclick="exportToExcel()">Export XLS</button>
            <button class="btn back-btn" onclick="openPage()">Back</button>

            <h3 id="time-date"></h3> 
        </div>

        <div id="chartWrapper">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <div style="text-align: left;">
                    <h4 id="chartTitle" style="margin: 0; color: #6a1b9a; font-size: 18px;">Performance Graph</h4>
                    <small style="color: #666;">Comparing Calls vs Visits (Monthly & Daily Avg)</small>
                </div>
                <button onclick="closeChart()" style="cursor:pointer; border:none; background:#ff4444; color:white; border-radius:4px; padding: 8px 15px; font-weight:bold;">✕ Close Chart</button>
            </div>
            <div style="height: 350px;">
                <canvas id="performanceChart"></canvas>
            </div>
        </div>

        <div class="table-container">
            <table id="dataTable">
                <thead>
                    <tr id="tableHead"></tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        let tableData = [];
        let myChart = null;

        // 1. Update Waktu Real-time
        function updateTime() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' };
            document.getElementById('time-date').innerText = "Waktu Akses: " + now.toLocaleDateString('id-ID', options);
        }
        setInterval(updateTime, 1000);
        updateTime();

        // 2. Load Data dari Dataset.json
        fetch('Dataset.json')
            .then(response => response.json())
            .then(data => {
                tableData = data;
                populateTable(data);
            })
            .catch(error => console.error('Error loading JSON:', error));

        function populateTable(data) {
            const tableHead = document.getElementById('tableHead');
            const tableBody = document.getElementById('tableBody');
            const branchFilter = document.getElementById('branchFilter');
            const periodeFilter = document.getElementById('periodeFilter');

            tableBody.innerHTML = '';
            let branches = new Set();
            let periods = new Set();

            if (data.length > 0) {
                const headers = Object.keys(data[0]);
                tableHead.innerHTML = headers.map(h => `<th>${h}</th>`).join('');

                data.forEach(row => {
                    let tr = document.createElement('tr');
                    headers.forEach((header, index) => {
                        let td = document.createElement('td');
                        td.textContent = row[header];

                        // Nama Marketing (Indeks 2) - Jadikan pemicu grafik
                        if (index === 2) {
                            td.classList.add('clickable-name');
                            td.title = "Klik untuk lihat detail grafik performa";
                            td.onclick = () => showChart(row);
                        }

                        // Logika Pewarnaan (Highlight)
                        if (header === "Login MTD" && row[header] == "0") td.classList.add("highlight-red");
                        if (header === "Login DTD") {
                            if (row[header] === "Y") td.classList.add("highlight-yes");
                            if (row[header] === "N") td.classList.add("highlight-no");
                        }

                        tr.appendChild(td);
                    });
                    tableBody.appendChild(tr);
                    if(row['Branch']) branches.add(row['Branch']);
                    if(row['Period']) periods.add(row['Period']);
                });

                updateFilterOptions(branchFilter, branches, 'All Branch');
                updateFilterOptions(periodeFilter, periods, 'All Period');
            }
        }

        // 3. Fungsi Grafik Multi-Metric (Call & Visit)
        function showChart(rowData) {
            const wrapper = document.getElementById('chartWrapper');
            const ctx = document.getElementById('performanceChart').getContext('2d');
            
            wrapper.style.display = 'block';
            document.getElementById('chartTitle').innerText = `Detail Performa: ${rowData['Marketing Name'] || rowData['Name']}`;

            if (myChart) myChart.destroy();

            // Ambil data Call vs Visit dari JSON (sesuaikan nama field)
            const mtdCall = parseFloat(rowData['MTD Call']) || 0;
            const mtdVisit = parseFloat(rowData['MTD Visit']) || 0;
            const avgCall = parseFloat(rowData['AVG Call']) || 0;
            const avgVisit = parseFloat(rowData['AVG Visit']) || 0;

            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Total MTD (Accumulated)', 'Daily Average'],
                    datasets: [
                        {
                            label: 'Calls',
                            data: [mtdCall, avgCall],
                            backgroundColor: '#6a1b9a', // Ungu
                            borderRadius: 6
                        },
                        {
                            label: 'Visits',
                            data: [mtdVisit, avgVisit],
                            backgroundColor: '#f39c12', // Oranye
                            borderRadius: 6
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'top' },
                        datalabels: {
                            anchor: 'end',
                            align: 'top',
                            color: '#444',
                            font: { weight: 'bold' },
                            formatter: (val) => val.toLocaleString('id-ID')
                        }
                    },
                    scales: {
                        y: { beginAtZero: true, grid: { color: '#eee' } },
                        x: { grid: { display: false } }
                    }
                },
                plugins: [ChartDataLabels]
            });

            // Gerakan scroll halus ke posisi grafik
            wrapper.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function closeChart() {
            document.getElementById('chartWrapper').style.display = 'none';
        }

        // 4. Filtering & Search
        function updateFilterOptions(filterElement, values, defaultLabel) {
            const currentVal = filterElement.value;
            filterElement.innerHTML = `<option value="">${defaultLabel}</option>`;
            Array.from(values).sort().forEach(value => {
                let option = document.createElement('option');
                option.value = value; option.textContent = value;
                filterElement.appendChild(option);
            });
            filterElement.value = currentVal;
        }

        function filterAndSearchTable() {
            const sBox = document.getElementById('searchBox').value.toLowerCase();
            const fPos = document.getElementById('positionFilter').value.toLowerCase();
            const fBranch = document.getElementById('branchFilter').value.toLowerCase();
            const fPer = document.getElementById('periodeFilter').value.toLowerCase();
            const fMTD = document.getElementById('zeroMTDFilter').value;

            document.querySelectorAll('#tableBody tr').forEach(row => {
                const cells = row.cells;
                // Asumsi Nama di index 2, Kode di index 1, Posisi 3, Cabang 4, MTD 5
                const matchName = cells[2].textContent.toLowerCase().includes(sBox) || cells[1].textContent.toLowerCase().includes(sBox);
                const matchPos = !fPos || cells[3].textContent.toLowerCase().includes(fPos);
                const matchBranch = !fBranch || cells[4].textContent.toLowerCase() === fBranch;
                const matchPer = !fPer || cells[0].textContent.toLowerCase() === fPer;
                const matchMTD = !fMTD || cells[5].textContent === fMTD;

                row.style.display = (matchName && matchPos && matchBranch && matchPer && matchMTD) ? "" : "none";
            });
        }

        function resetFilter() {
            document.getElementById('searchBox').value = "";
            document.getElementById('positionFilter').value = "";
            document.getElementById('branchFilter').value = "";
            document.getElementById('periodeFilter').value = "";
            document.getElementById('zeroMTDFilter').value = "";
            filterAndSearchTable();
            closeChart();
        }

        // 5. Excel Export
        function exportToExcel() {
            const table = document.getElementById("dataTable");
            const visibleRows = Array.from(table.rows).filter(row => row.style.display !== "none");
            
            const cleanData = visibleRows.map(row => 
                Array.from(row.cells)
                .filter((_, i) => i !== 1) // Abaikan Marketing Code
                .map(cell => cell.textContent.trim())
            );
            
            if (cleanData.length <= 1) return alert("Pilih data terlebih dahulu!");

            const ws = XLSX.utils.aoa_to_sheet(cleanData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Performance");
            XLSX.writeFile(wb, `Performance_Sumatera_${new Date().toISOString().split('T')[0]}.xlsx`);
        }

        function printTable() { window.print(); }
        function openPage() { window.location.href = 'https://bmi-apps.github.io/regionsumatera/'; }
    </script>
</body>
</html>
