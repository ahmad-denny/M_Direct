<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M|Direct Performance Sumatera</title>
    <style>
        /* Gaya Dasar */
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f8f9fa; padding: 20px; }
        .container { width: 98%; max-width: 98%; margin: 0; background: #fff; padding: 10px; border-radius: 10px; box-shadow: 0 0 10px rgba(0, 0, 0, 0.1); overflow-x: hidden; }
        h2 { color: white; background-color: purple; padding: 10px; border-radius: 5px; margin-top: 0; }
        h3 { text-align: right; font-size: 13px; font-style: italic; font-weight: lighter; margin: 5px 0 0;}
        
        /* Filter dan Tombol */
        .filter-container { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; padding: 15px; background: #f1f1f1; border-radius: 8px; margin-bottom: 10px; justify-content: flex-start; }
        input[type="text"], select { width: 100%; max-width: 300px; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .reset-btn { background: green; color: white; border: none; padding: 10px 15px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .print-btn { background: #28a745; color: white; border: none; padding: 10px 15px; cursor: pointer; border-radius: 5px; font-weight: bold; margin-top: 20px; }
        .tombol-back { display: inline-block; padding: 10px 15px; font-size: 16px; text-decoration: none; cursor: pointer; background-color: darkred; color: white; border-radius: 5px; }

        /* Tabel */
        .table-container { overflow-x: auto; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 1px; font-size: 13px; }
        th, td { padding: 8px; border: 1px solid #ddd; text-align: center; }
        td { text-align: left; white-space: nowrap; }
        th { background-color: purple; color: white; }
        
        /* Highlight dan Kolom Tersembunyi */
        .highlight-yes { color: #28a745; font-weight: bold; } /* Menggunakan warna yang lebih kontras */
        .highlight-no, .highlight-red { color: #dc3545; font-weight: bold; } /* Menggunakan warna yang lebih kontras */
        table td:nth-child(n+6), table th:nth-child(n+6) { text-align: center; }
        table td:nth-child(2), th:nth-child(2) { display: none; } /* Kolom ke-2 disembunyikan */

        /* Responsif */
        @media screen and (max-width: 768px) {
            .filter-container { flex-direction: column; align-items: stretch;}
            input, select, .reset-btn, .tombol-back { width: 100%; max-width: none; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>M-Direct Performance Region Sumatera</h2>
        
        <div class="filter-container">
            <input type="text" id="searchBox" placeholder="Name or Marketing Code..." onkeyup="filterAndSearchTable()">
            <select id="positionFilter" onchange="filterAndSearchTable()">
                <option value="">All Position</option>
                <option value="RM">RM</option>
                <option value="RM C">RM Consumer</option>
                <option value="RM P">RM Prioritas</option>
                <option value="RM F">RM Funding & Hajj</option>
                <option value="CS">CS</option>
            </select>
            <select id="branchFilter" onchange="filterAndSearchTable()">
                <option value="">All Branch</option>
            </select>
            <select id="periodeFilter" onchange="filterAndSearchTable()">
                <option value="">All Period</option>
            </select>
            <select id="zeroMTDFilter" onchange="filterAndSearchTable()">
                <option value="">Login MTD</option>
                <option value="0">NOT Login MTD</option>
            </select>
            <select id="zeroDTDFilter" onchange="filterAndSearchTable()">
                <option value="">Login DTD</option>
                <option value="N">NOT Login DTD</option>
            </select>
            <button class="reset-btn" onclick="resetFilter()">Reset</button>
            <a href="https://bmi-apps.github.io/RegionSumatera/#" class="tombol-back">Back</a>
            <h3><p id="time-date"></p></h3>
        </div>

        <div class="table-container">
            <table id="dataTable">
                <thead>
                    <tr id="tableHead"></tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
    <button class="print-btn" onclick="printTable()">Print / Save PDF</button>

    <script>
        let tableData = [];

        // Fungsi untuk mengupdate waktu dan tanggal
        function updateTimeDate() {
            const now = new Date();
            const time = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: "2-digit" });
            const date = now.toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            document.getElementById("time-date").innerHTML = `${date} | ${time} WIB`;
        }
        setInterval(updateTimeDate, 1000);
        updateTimeDate();

        // 1. Ambil Data dan Isi Tabel
        fetch('Dataset.json')
            .then(response => {
                if (!response.ok) throw new Error('Network response was not ok');
                return response.json();
            })
            .then(data => populateTable(data))
            .catch(error => console.error('Error loading JSON:', error));

        function populateTable(data) {
            const tableHead = document.getElementById('tableHead');
            const tableBody = document.getElementById('tableBody');
            const branchFilter = document.getElementById('branchFilter');
            const periodeFilter = document.getElementById('periodeFilter');
            
            tableBody.innerHTML = '';
            tableData = data;
            let branches = new Set();
            let periods = new Set();

            if (data.length > 0) {
                // Isi Header
                tableHead.innerHTML = Object.keys(data[0]).map(header => `<th>${header}</th>`).join('');

                // Isi Body
                data.forEach(row => {
                    let tr = document.createElement('tr');
                    Object.values(row).forEach(cell => {
                        let td = document.createElement('td');
                        td.textContent = cell;
                        tr.appendChild(td);
                    });

                    // Terapkan highlight ke kolom ke-6 (indeks 5) dan ke-7 (indeks 6)
                    let loginMTDCell = tr.cells[5];
                    if (loginMTDCell && loginMTDCell.textContent === "0") {
                        loginMTDCell.classList.add("highlight-red");
                    }
                    
                    let loginDTDCell = tr.cells[6];
                    if (loginDTDCell) {
                        if (loginDTDCell.textContent === "Y") loginDTDCell.classList.add("highlight-yes");
                        else if (loginDTDCell.textContent === "N") loginDTDCell.classList.add("highlight-no");
                    }

                    tableBody.appendChild(tr);
                    branches.add(row['Branch']);
                    periods.add(row['Period']);
                });

                // Isi Opsi Filter
                updateFilterOptions(branchFilter, branches, 'All Branch');
                updateFilterOptions(periodeFilter, periods, 'All Period');
            }
        }

        function updateFilterOptions(filterElement, values, defaultLabel) {
            filterElement.innerHTML = `<option value="">${defaultLabel}</option>`;
            values.forEach(value => {
                let option = document.createElement('option');
                option.value = value;
                option.textContent = value;
                filterElement.appendChild(option);
            });
        }

        // 2. Filter dan Cari
        function filterAndSearchTable() {
            const searchValue = document.getElementById('searchBox').value.toLowerCase();
            const positionValue = document.getElementById('positionFilter').value.toLowerCase();
            const branchValue = document.getElementById('branchFilter').value.toLowerCase();
            const periodeValue = document.getElementById('periodeFilter').value.toLowerCase();
            const zeroMTDValue = document.getElementById('zeroMTDFilter').value.toLowerCase();
            const zeroDTDValue = document.getElementById('zeroDTDFilter').value.toLowerCase();

            document.getElementById('tableBody').querySelectorAll('tr').forEach(row => {
                let cells = row.getElementsByTagName('td');

                let nameMarketingMatch = searchValue === "" ||
                                         (cells[1] && cells[1].textContent.toLowerCase().includes(searchValue)) ||
                                         (cells[2] && cells[2].textContent.toLowerCase().includes(searchValue));

                let positionMatch = positionValue === "" || (cells[3] && cells[3].textContent.trim().toLowerCase().includes(positionValue));
                let branchMatch = branchValue === "" || (cells[4] && cells[4].textContent.toLowerCase() === branchValue);
                let periodeMatch = periodeValue === "" || (cells[0] && cells[0].textContent.toLowerCase() === periodeValue);
                let zeroMTDMatch = zeroMTDValue === "" || (cells[5] && cells[5].textContent.toLowerCase() === zeroMTDValue);
                let zeroDTDMatch = zeroDTDValue === "" || (cells[6] && cells[6].textContent.toLowerCase() === zeroDTDValue);

                if (nameMarketingMatch && positionMatch && branchMatch && periodeMatch && zeroMTDMatch && zeroDTDMatch) {
                    row.style.display = "";
                } else {
                    row.style.display = "none";
                }
            });
        }
        
        // 3. Reset Filter
        function resetFilter() {
            document.getElementById('searchBox').value = "";
            document.getElementById('positionFilter').value = "";
            document.getElementById('branchFilter').value = "";
            document.getElementById('periodeFilter').value = "";
            document.getElementById('zeroMTDFilter').value = "";
            document.getElementById('zeroDTDFilter').value = "";
            filterAndSearchTable();
        }

        // 4. Print Tabel
        function printTable() {
            let tableContent = document.getElementById("dataTable").outerHTML;
            let originalContent = document.body.innerHTML;
        
            // Sembunyikan elemen filter dan tombol sebelum mencetak untuk hasil yang bersih
            document.body.innerHTML = tableContent;
            window.print();
            document.body.innerHTML = originalContent; // Kembalikan konten asli setelah mencetak
            // Catatan: Anda mungkin perlu memanggil ulang `populateTable` setelah mengembalikan konten asli 
            // jika implementasi di atas menyebabkan data hilang. Namun, untuk file sederhana ini, diasumsikan cukup.
            location.reload(); // Solusi yang lebih aman untuk memuat ulang semua JavaScript
        }
    </script>
</body>
</html>
