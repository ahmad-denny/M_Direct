<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M|Direct Performance Sumatera</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>

    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; padding: 20px; margin: 0; text-align: center; }
        .container { width: 98%; max-width: 1400px; margin: 0 auto; background: #fff; padding: 15px; border-radius: 12px; box-shadow: 0px 4px 20px rgba(0,0,0,0.08); }
        
        .header-banner { 
            color: white; 
            background: linear-gradient(90deg, #8e24aa, #6a1b9a); 
            padding: 20px; 
            border-radius: 8px; 
            margin-bottom: 15px;
        }
        .header-banner h2 { margin: 0; font-size: 22px; }
        .as-of-text { display: block; font-size: 14px; margin-top: 5px; opacity: 0.9; }

        .filter-container { 
            display: flex; 
            flex-direction: row; 
            align-items: center;
            gap: 8px; 
            padding: 15px; 
            background: #f8f9fa; 
            border-radius: 8px; 
            margin-bottom: 20px; 
            border: 1px solid #eee;
        }

        input, select { 
            padding: 10px; border: 1px solid #ccc; border-radius: 6px; 
            font-size: 13px; flex: 1; min-width: 120px;
        }

        .btn { 
            padding: 10px 15px; border: none; border-radius: 6px; 
            cursor: pointer; font-weight: bold; color: white; 
            font-size: 13px; white-space: nowrap; transition: 0.2s;
        }
        
        .reset-btn { background-color: #28a745; }
        .print-btn { background-color: #6f42c1; }
        .export-btn { background-color: #f39c12; }
        .back-btn { background-color: #dc3545; }
        .btn:hover { opacity: 0.8; }

        .table-container { overflow-x: auto; border-radius: 8px; border: 1px solid #eee; max-height: 500px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th, td { padding: 12px 10px; border: 1px solid #ddd; text-align: left; white-space: nowrap; }
        th { background-color: #6a1b9a; color: white; position: sticky; top: 0; z-index: 10; }
        tr:nth-child(even) { background-color: #f9f9f9; }

        @media screen and (max-width: 900px) {
            .filter-container { flex-direction: column; }
            input, select, .btn { width: 100%; flex: none; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-banner">
        <h2>Top 10 Booking Performance Region Sumatera</h2>
        <span id="asOfDisplay" class="as-of-text">Memuat data...</span>
    </div>

    <div class="filter-container">
        <select id="branchFilter" onchange="filterTable()">
            <option value="">Semua Main Branch</option>
        </select>
        
        <select id="officeFilter" onchange="filterTable()">
            <option value="">Semua Office</option>
        </select>

        <select id="periodeFilter" onchange="filterTable()">
            <option value="">Semua Periode</option>
        </select>

        <button class="btn reset-btn" onclick="resetFilter()">Reset</button>
        <button class="btn print-btn" onclick="window.print()">Print</button>
        <button class="btn export-btn" onclick="exportToExcel()">Export XLS</button>
        <button class="btn back-btn" onclick="window.location.href='https://m-activity.vercel.app/'">M-Direct</button> 
    </div>

    <div class="table-container">
        <table id="dataTable">
            <thead><tr id="tableHead"></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    let originalData = [];

    // 1. Ambil Data dari JSON
    fetch('Dataset.json')
        .then(response => response.json())
        .then(data => {
            originalData = data;
            initDashboard(data);
        })
        .catch(error => {
            console.error('Error:', error);
            document.getElementById('asOfDisplay').textContent = "Gagal memuat Dataset.json";
        });

    function initDashboard(data) {
        if (data.length === 0) return;

        // Update Header "As of" dari baris pertama kolom Period (jika ada)
        if(data[0].Period) {
            document.getElementById('asOfDisplay').textContent = "as of " + data[0].Period;
        }

        // Buat Header Tabel secara Otomatis
        const headers = Object.keys(data[0]);
        const headRow = document.getElementById('tableHead');
        headRow.innerHTML = headers.map(h => `<th>${h}</th>`).join('');

        // Isi Pilihan Filter secara Otomatis
        populateDropdown('branchFilter', data, 'Branch'); // Sesuaikan nama kolom di JSON Anda
        populateDropdown('officeFilter', data, 'Office'); // Sesuaikan nama kolom di JSON Anda
        populateDropdown('periodeFilter', data, 'Period');

        renderTable(data);
    }

    function populateDropdown(id, data, key) {
        const select = document.getElementById(id);
        const uniqueValues = [...new Set(data.map(item => item[key]).filter(v => v))].sort();
        
        uniqueValues.forEach(val => {
            let opt = document.createElement('option');
            opt.value = val;
            opt.textContent = val;
            select.appendChild(opt);
        });
    }

    function renderTable(data) {
        const body = document.getElementById('tableBody');
        const headers = Object.keys(data[0]);
        
        body.innerHTML = data.map(row => {
            return `<tr>${headers.map(h => `<td>${row[h] || ''}</td>`).join('')}</tr>`;
        }).join('');
    }

    function filterTable() {
        const branchVal = document.getElementById('branchFilter').value;
        const officeVal = document.getElementById('officeFilter').value;
        const periodVal = document.getElementById('periodeFilter').value;

        const filtered = originalData.filter(item => {
            return (branchVal === "" || item.Branch === branchVal) &&
                   (officeVal === "" || item.Office === officeVal) &&
                   (periodVal === "" || item.Period === periodVal);
        });

        renderTable(filtered);
    }

    function resetFilter() {
        document.getElementById('branchFilter').value = "";
        document.getElementById('officeFilter').value = "";
        document.getElementById('periodeFilter').value = "";
        renderTable(originalData);
    }

    function exportToExcel() {
        const table = document.getElementById("dataTable");
        const wb = XLSX.utils.table_to_book(table, {sheet: "Data"});
        XLSX.writeFile(wb, "Performance_Report.xlsx");
    }
</script>

</body>
</html>
